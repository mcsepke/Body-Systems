<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11 Major Body Systems — Study Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b65;
    --text-faint: #9b9b93;
    --accent: #1D9E75;
    --accent-light: #E1F5EE;
    --accent-dark: #085041;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .site-header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .site-tagline {
    font-size: 12px;
    color: var(--text-faint);
    font-weight: 400;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
    gap: 28px;
    align-items: flex-start;
  }

  /* ── Sidebar Nav ── */
  .sidebar {
    width: 176px;
    flex-shrink: 0;
    position: sticky;
    top: 80px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 10px;
    margin-bottom: 8px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 8px 10px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 1px;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 500; }
  .nav-icon { font-size: 15px; flex-shrink: 0; }

  /* ── Main content ── */
  .main {
    flex: 1;
    min-width: 0;
  }

  .page { display: none; animation: fadeIn 0.2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* ── System header ── */
  .sys-header {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 0.5px solid var(--border);
  }
  .sys-icon {
    width: 58px;
    height: 58px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .sys-title {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .sys-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 560px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-faint);
    margin-bottom: 12px;
  }

  /* ── Components grid ── */
  .components-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 0 24px;
  }
  .component {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 7px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .component:last-child { border-bottom: none; }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .comp-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
  .comp-desc { font-size: 11.5px; color: var(--text-muted); line-height: 1.45; }

  /* ── Two-col bottom row ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* ── Functions list ── */
  .fun-list { list-style: none; }
  .fun-item {
    font-size: 12.5px;
    color: var(--text-muted);
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    line-height: 1.5;
  }
  .fun-item:last-child { border-bottom: none; }
  .fun-item::before { content: '→ '; color: var(--accent); font-weight: 500; }

  /* ── Fact box ── */
  .fact-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
  }
  .fact-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .fact-text { font-size: 12.5px; color: var(--accent-dark); line-height: 1.55; }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .layout { flex-direction: column; padding: 16px; gap: 16px; }
    .sidebar { width: 100%; position: static; display: flex; flex-wrap: wrap; gap: 4px; }
    .sidebar-label { display: none; }
    .nav-btn { width: auto; padding: 5px 10px; font-size: 12px; }
    .bottom-row { grid-template-columns: 1fr; }
    .site-header { padding: 14px 16px; }
    .components-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">Body Systems Study Sheet</div>
  <div class="site-tagline">11 major systems · components · functions · key facts</div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Systems</div>
  </nav>
  <main class="main" id="pages"></main>
</div>

  },
  {

      {name:'Gonads',desc:'Testes (testosterone), ovaries (estrogen, progesterone) — reproduction'},
      {name:'Pineal gland',desc:'Secretes melatonin — regulates sleep-wake (circadian) rhythms'},

  {

const sidebar = document.getElementById('sidebar');
const pages = document.getElementById('pages');

systems.forEach((s, i) => {
  // Nav button
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<span class="nav-icon">${s.icon}</span>${s.name.replace(' system', '')}`;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + s.id).classList.add('active');
  };
  sidebar.appendChild(btn);

  // Page
  const page = document.createElement('div');
  page.className = 'page' + (i === 0 ? ' active' : '');
  page.id = 'page-' + s.id;

  const compsHtml = s.components.map(c => `
    <div class="component">
      <div class="dot" style="background:${s.color}"></div>
      <div>
        <div class="comp-name">${c.name}</div>
        <div class="comp-desc">${c.desc}</div>
      </div>
    </div>`).join('');

  const funcsHtml = s.functions.map(f => `<li class="fun-item">${f}</li>`).join('');

  page.innerHTML = `
    <div class="sys-header">
      <div class="sys-icon" style="background:${s.bg}">${s.icon}</div>
      <div>
        <div class="sys-title">${s.name}</div>
        <div class="sys-subtitle">${s.subtitle}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Components &amp; structures</div>
      <div class="components-grid">${compsHtml}</div>
    </div>
    <div class="bottom-row">
      <div class="card">
        <div class="card-label">Key functions</div>
        <ul class="fun-list">${funcsHtml}</ul>
      </div>
      <div class="fact-box">
        <div class="fact-label">Quick fact</div>
        <div class="fact-text">${s.fact}</div>
      </div>
    </div>`;

  pages.appendChild(page);
});
</script>
</body>
</html>
